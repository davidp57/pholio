<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pholio 📸</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="logo">📸 Pholio</div>

      <section class="config-section">
        <h3>Album</h3>
        <select id="album-select">
          <option value="">— Choisir un album —</option>
        </select>
      </section>

      <section class="config-section" id="config-panel" style="display:none">
        <h3>Format de page</h3>
        <select id="page-format">
          <option value="a4-landscape">A4 paysage</option>
          <option value="a4-portrait">A4 portrait</option>
          <option value="a3-landscape">A3 paysage</option>
          <option value="a3-portrait">A3 portrait</option>
          <option value="square-30">Carré 30 cm</option>
          <option value="square-20">Carré 20 cm</option>
          <option value="letter-landscape">Letter paysage</option>
          <option value="letter-portrait">Letter portrait</option>
          <option value="custom">Personnalisé</option>
        </select>
        <div id="custom-format" style="display:none">
          <label>Largeur (mm) <input type="number" id="custom-w" value="200" min="50" max="1200" /></label>
          <label>Hauteur (mm) <input type="number" id="custom-h" value="200" min="50" max="1200" /></label>
        </div>

        <h3>Mise en page</h3>
        <select id="layout-type">
          <option value="mosaic">Mosaïque</option>
          <option value="grid">Grille</option>
          <option value="columns">Colonnes</option>
        </select>

        <h3>Ordre des photos</h3>
        <select id="sort-order">
          <option value="filename">Nom de fichier</option>
          <option value="exif_date">Date EXIF</option>
          <option value="manual">Manuel</option>
        </select>

        <h3>Colonnes</h3>
        <input type="number" id="columns" value="3" min="1" max="10" />

        <div class="button-row">
          <button id="btn-save">💾 Sauvegarder</button>
          <button id="btn-export">📄 Exporter PDF</button>
        </div>
      </section>
    </aside>

    <main id="canvas-area">
      <div id="pages-container"></div>
    </main>
  </div>

  <!-- Re-layout modal -->
  <div id="relock-modal" class="modal" style="display:none">
    <div class="modal-content">
      <h2>Photos verrouillées</h2>
      <p>Des photos sont verrouillées. Que souhaitez-vous faire ?</p>
      <button class="modal-btn" data-behaviour="keep">Conserver les photos verrouillées à leur place</button>
      <button class="modal-btn" data-behaviour="first">Remettre les photos verrouillées en premier</button>
      <button class="modal-btn" data-behaviour="unlock">Déverrouiller toutes les photos et recalculer</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
