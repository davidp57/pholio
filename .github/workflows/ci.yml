name: CI

on:
  push:
    branches: [main, develop, "feature/**", "fix/**", "release/**", "hotfix/**"]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Python: lint + typecheck + tests ──────────────────────────────────────
  python:
    name: Tests Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install

      - name: Ruff — lint
        run: poetry run ruff check src/ tests/

      - name: Ruff — format
        run: poetry run ruff format --check src/ tests/

      - name: Mypy
        run: poetry run python -m mypy src/

      - name: Pytest
        run: poetry run pytest tests/ -q

  # ── JavaScript: syntax check ───────────────────────────────────────────────
  javascript:
    name: Vérification JavaScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Vérification syntaxe app.js
        run: node --check static/app.js

  # ── Build exécutable Windows ───────────────────────────────────────────────
  build-exe:
    name: Build exe Windows
    runs-on: windows-latest
    needs: [python, javascript]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install

      - name: Install PyInstaller
        run: poetry run pip install pyinstaller

      - name: Build exe (onefile)
        run: poetry run pholio-build --onefile

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: pholio-windows-exe
          path: dist/pholio.exe
          retention-days: 7
