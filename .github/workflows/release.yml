name: Release

"on":
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Build exe & Publish release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install

      - name: Install PyInstaller
        run: poetry run pip install pyinstaller

      - name: Build exe (onefile)
        run: poetry run pholio-build --onefile

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create ${{ github.ref_name }}
          dist/pholio.exe
          --title "Pholio ${{ github.ref_name }}"
          --generate-notes
